version: '3.8'

services:
  # Backend Service 1: Constructor Connect
  constructor-backend:
    build:
      context: ./backend/engineer&constructor_connect_backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
    volumes:
      - ./backend/engineer&constructor_connect_backend:/app
    command: flask run --host=0.0.0.0

  # Backend Service 2: Blueprint Generator
  blueprint-backend:
    build:
      context: ./backend/blueprint-generator
    ports:
      - "5002:5002"
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
    volumes:
      - ./backend/blueprint-generator:/app
    command: flask run --host=0.0.0.0 --port=5002

  # Backend Service 3: Marketplace
  marketplace-backend:
    build:
      context: ./backend/marketPlace
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=development
      - FLASK_APP=marketPlace.py
    volumes:
      - ./backend/marketPlace:/app
    command: flask run --host=0.0.0.0 --port=5001
